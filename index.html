<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xia Yuke | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ffffff;
            --secondary: #ffeef8;
            --accent: #ff69b4;
            --accent-light: #ffb6c1;
            --bg-light: #fff5f8;
            --bg-gradient: linear-gradient(180deg, #fff0f5 0%, #fff5f8 50%, #f0f8ff 100%);
            --text-primary: #4a4a6a;
            --text-secondary: #7a7a9a;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'STSong', 'SimSun', serif;
            line-height: 1.6;
            color: var(--primary);
            background: var(--bg-light);
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(180deg, #ffeef8 0%, #fff0f5 30%, #fff5f8 60%, #f0f8ff 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.4) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(221, 160, 221, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(173, 216, 230, 0.2) 0%, transparent 50%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        .avatar {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 2rem;
            box-shadow:
                0 20px 60px rgba(255, 105, 180, 0.3),
                0 0 0 10px rgba(255, 255, 255, 0.8);
            animation: fadeInUp 1s ease-out 0.2s both, float 4s ease-in-out infinite;
        }

        .name {
            font-size: 3rem;
            font-weight: 700;
            color: #8b4789;
            margin-bottom: 0.5rem;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.5);
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .title {
            font-size: 1.3rem;
            color: #da70d6;
            margin-bottom: 1.5rem;
            font-weight: 500;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .greeting {
            font-size: 1.1rem;
            color: #9b7bb8;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 182, 193, 0.5);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-block;
            animation: fadeInUp 1s ease-out 0.8s both;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3);
        }

        /* About Section */
        .about {
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #fff5f8 0%, #f8f0ff 100%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #8b4789;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #ffb6c1, #ff69b4, #da70d6);
            margin: 0.8rem auto 0;
            border-radius: 2px;
        }

        .about-card {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 182, 193, 0.5);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.2);
        }

        .about-card p {
            font-size: 1.1rem;
            color: #7a7a9a;
            line-height: 1.8;
        }

        .university {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 100%);
            color: white;
            border-radius: 50px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        /* Contact Section */
        .contact {
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #f8f0ff 0%, #fff0f5 100%);
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(221, 160, 221, 0.5);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(218, 112, 214, 0.15);
            max-width: 500px;
            margin: 0 auto;
        }

        .contact-title {
            font-size: 1.3rem;
            color: #9b7bb8;
            margin-bottom: 1.5rem;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .contact-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: #8b4789;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.3) 0%, rgba(221, 160, 221, 0.3) 100%);
            border: 1px solid rgba(255, 182, 193, 0.5);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: linear-gradient(135deg, #ffb6c1 0%, #da70d6 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.3) 0%, rgba(221, 160, 221, 0.3) 100%);
            border: 1px solid rgba(255, 182, 193, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #da70d6;
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: linear-gradient(135deg, #ff69b4 0%, #da70d6 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.4);
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            color: #9b7bb8;
            font-size: 0.9rem;
            background: linear-gradient(180deg, #fff0f5 0%, #ffeef8 100%);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .name {
                font-size: 2.2rem;
            }
            .title {
                font-size: 1.1rem;
            }
            .avatar {
                width: 120px;
                height: 120px;
                font-size: 3rem;
            }
            .about, .contact {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <img src="修复图片.png" alt="Xia Yuke" class="avatar">
            <h1 class="name">Xia Yuke</h1>
            <p class="title">厦门大学博士研究生</p>

    <section class="contact">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <div class="contact-card">
                <p class="contact-title">期待与您的交流与合作</p>
                <div class="contact-list">

                    </div>
                    <div class="contact-item">

                </div>
                <div class="social-links">
                    <a href="#" class="social-link" title="GitHub">🐙</a>

                    <a href="#" class="social-link" title="WeChat">💬</a>

            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 Xia Yuke. All rights reserved.</p>
    </footer>
</body>
</html>
